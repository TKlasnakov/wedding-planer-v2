<header appChartHeader (addTable)="openAddTable()"></header>

<div class="chart-body">
  <app-unassigned-guests
    [guests]="guestsByTable().get(null) ?? []"
    [connectedTo]="allDropListIds()"
    (dropped)="onDrop($event, null)"
  />

  <app-tables-grid
    [tables]="tables()"
    [guestsByTable]="guestsByTable()"
    [connectedTo]="allDropListIds()"
    (dropped)="onDrop($event.event, $event.table)"
    (editTable)="openEditTable($event)"
    (deleteTable)="deleteTable($event)"
  />
</div>
